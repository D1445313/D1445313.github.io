<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西屯飲品地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-gray-50 font-sans">

    <header class="sticky top-0 bg-white p-4 custom-shadow z-10">
        <h1 class="text-xl font-bold text-gray-800 mb-3 text-center">西屯區飲品指南</h1>
        <div class="relative">
            <input type="text" placeholder="搜尋店名或地址..."
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
    </header>

    <main class="p-4">
        <div
            class="bg-gray-200 w-full h-64 rounded-xl mb-6 flex items-center justify-center text-gray-500 border-2 border-dashed border-gray-400">
            [ 地圖 API 載入區域 - 西屯區 ]
        </div>

        <section>
            <h2 class="text-lg font-semibold mb-4 text-gray-700">附近熱門店家</h2>

            <div class="bg-white p-4 rounded-xl mb-4 custom-shadow border border-gray-100">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg">逢甲 1 號茶飲</h3>
                        <p class="text-sm text-gray-500 italic">黃金比例分享：半糖少冰</p>
                    </div>
                    <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded">營業中</span>
                </div>
                <div class="mt-4 flex gap-2">
                    <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=逢甲大學飲料店')"
                        class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-medium active:bg-blue-800">
                        導航路徑
                    </button>

                    <button onclick="alert('店家詳細資訊開發中！預計包含：黃金比例、支付方式、校園優惠')"
                        class="flex-1 border border-blue-600 text-blue-600 py-2 rounded-lg font-medium active:bg-gray-100">
                        查看詳細
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3">
        <button class="text-blue-600 flex flex-col items-center">
            <span class="text-xs mt-1">地圖</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <span class="text-xs mt-1">黃金比例</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <span class="text-xs mt-1">個人收藏</span>
        </button>
    </nav>

</body>

</html>
